{% extends "base.html" %}

{% block title %}Create account - MCU Vault{% endblock %}

{% block auth_content %}
<div class="auth-card">
    <div class="auth-header">
        <div class="auth-logo">
            <i class="bi bi-shield-check"></i>
        </div>
        <h1 class="auth-title">Create account</h1>
        <p class="auth-subtitle">Start managing your health records</p>
    </div>
    
    <form method="POST" action="{{ url_for('auth.register') }}" class="auth-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        
        <div class="form-group">
            <label for="username" class="form-label">Username</label>
            <input type="text" 
                   class="form-input" 
                   id="username" 
                   name="username" 
                   placeholder="Choose a username"
                   value="{{ username or '' }}"
                   minlength="3"
                   maxlength="80"
                   required autofocus>
        </div>
        
        <div class="form-group">
            <label for="email" class="form-label">Email</label>
            <input type="email" 
                   class="form-input" 
                   id="email" 
                   name="email" 
                   placeholder="Enter your email"
                   value="{{ email or '' }}"
                   required>
        </div>
        
        <div class="form-group">
            <label for="password" class="form-label">Password</label>
            <input type="password" 
                   class="form-input" 
                   id="password" 
                   name="password" 
                   placeholder="Create a password"
                   minlength="6"
                   required>
        </div>
        
        <div class="form-group">
            <label for="confirm_password" class="form-label">Confirm password</label>
            <input type="password" 
                   class="form-input" 
                   id="confirm_password" 
                   name="confirm_password" 
                   placeholder="Confirm your password"
                   minlength="6"
                   required>
        </div>
        
        <button type="submit" class="btn btn-primary btn-lg auth-submit">
            Create account
        </button>
    </form>
    
    <div class="auth-footer">
        Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a>
    </div>
</div>
{% endblock %}
