{% extends "base.html" %}

{% block title %}Register - MCU Vault{% endblock %}

{% block auth_content %}
<div class="auth-form-modern">
    <div class="auth-form-header">
        <h2><i class="bi bi-shield-check" style="font-size: 3rem; color: var(--primary-600);"></i></h2>
        <h2>Create Account</h2>
        <p>Register to start managing your medical records</p>
    </div>
    
    <form method="POST" action="{{ url_for('auth.register') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="auth-form-group">
            <label for="username" class="auth-form-label">
                <i class="bi bi-person"></i> Username
            </label>
            <input type="text" 
                   class="auth-form-input" 
                   id="username" 
                   name="username" 
                   placeholder="Choose a username"
                   value="{{ username or '' }}"
                   minlength="3"
                   maxlength="80"
                   required 
                   autofocus>
        </div>
        
        <div class="auth-form-group">
            <label for="email" class="auth-form-label">
                <i class="bi bi-envelope"></i> Email Address
            </label>
            <input type="email" 
                   class="auth-form-input" 
                   id="email" 
                   name="email" 
                   placeholder="Enter your email address"
                   value="{{ email or '' }}"
                   required>
        </div>
        
        <div class="auth-form-group">
            <label for="password" class="auth-form-label">
                <i class="bi bi-lock"></i> Password
            </label>
            <input type="password" 
                   class="auth-form-input" 
                   id="password" 
                   name="password" 
                   placeholder="Create a password"
                   minlength="6"
                   required>
        </div>
        
        <div class="auth-form-group">
            <label for="confirm_password" class="auth-form-label">
                <i class="bi bi-lock-fill"></i> Confirm Password
            </label>
            <input type="password" 
                   class="auth-form-input" 
                   id="confirm_password" 
                   name="confirm_password" 
                   placeholder="Confirm your password"
                   minlength="6"
                   required>
        </div>
        
        <button type="submit" class="auth-submit-btn">
            <i class="bi bi-person-plus"></i> Create Account
        </button>
    </form>
    
    <div class="auth-form-footer">
        <p>Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a></p>
    </div>
</div>
{% endblock %}
