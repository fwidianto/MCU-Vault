{% extends "base.html" %}

{% block title %}Login - MCU Vault{% endblock %}

{% block auth_content %}
<div class="auth-form-modern">
    <div class="auth-form-header">
        <h2><i class="bi bi-shield-check" style="font-size: 3rem; color: var(--primary-600);"></i></h2>
        <h2>Welcome Back</h2>
        <p>Sign in to access your medical check-up records</p>
    </div>

    <form method="POST" action="{{ url_for("auth.login") }}" id="loginForm">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="auth-form-group">
            <label for="username" class="auth-form-label">
                <i class="bi bi-person"></i> Username
            </label>
            <input type="text"
                   class="auth-form-input"
                   id="username"
                   name="username"
                   placeholder="Enter your username"
                   required autofocus>
        </div>

        <div class="auth-form-group">
            <label for="password" class="auth-form-label">
                <i class="bi bi-lock"></i> Password
            </label>
            <input type="password"
                   class="auth-form-input"
                   id="password"
                   name="password"
                   placeholder="Enter your password"
                   required>
        </div>

        <button type="submit" class="auth-submit-btn">
            <i class="bi bi-box-arrow-in-right"></i> Sign In
        </button>
    </form>

    <div class="auth-form-footer">
        <p>Don't have an account? <a href="{{ url_for("auth.register") }}">Create one</a></p>
    </div>
</div>
{% endblock %}
